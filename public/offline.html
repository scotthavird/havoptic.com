<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Offline - Havoptic</title>
    <meta name="theme-color" content="#0f172a" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background-color: #0f172a;
        color: #e2e8f0;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 1rem;
      }
      .container {
        text-align: center;
        max-width: 28rem;
      }
      .icon {
        font-size: 4rem;
        margin-bottom: 1.5rem;
        opacity: 0.7;
      }
      h1 {
        font-size: 1.5rem;
        font-weight: 700;
        color: #f8fafc;
        margin-bottom: 0.75rem;
      }
      p {
        color: #94a3b8;
        line-height: 1.6;
        margin-bottom: 1.5rem;
      }
      button {
        background-color: #1e293b;
        color: #e2e8f0;
        border: 1px solid #334155;
        padding: 0.625rem 1.5rem;
        border-radius: 0.5rem;
        font-size: 0.875rem;
        cursor: pointer;
        transition: background-color 0.15s;
      }
      button:hover { background-color: #334155; }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="icon">&#x1F4E1;</div>
      <h1>You're offline</h1>
      <p>Havoptic needs an internet connection to load the latest AI tool releases. Please check your connection and try again.</p>
      <button onclick="window.location.reload()">Retry</button>
    </div>
  </body>
</html>
